<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNV Fact Arena</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#e8e0d5;min-height:100vh}

/* HEADER */
.header{background:#111;border-bottom:2px solid #D85A30;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:12px;font-weight:700;color:#D85A30;letter-spacing:.08em;text-transform:uppercase;line-height:1.3}
.logo span{display:block;color:#444;font-weight:400;font-size:10px;letter-spacing:.04em;text-transform:none;margin-top:1px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;transition:background .4s}
.dot.on{background:#22c55e;animation:bl 2s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}

/* TABS */
.tabs{display:flex;background:#0d0d0d;border-bottom:1px solid #1a1a1a;position:sticky;top:52px;z-index:90}
.tab{flex:1;padding:11px 2px;font-size:12px;font-weight:600;color:#444;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:-1px;letter-spacing:.02em}
.tab.active{color:#D85A30;border-bottom-color:#D85A30}
.tab:hover:not(.active){color:#aaa}

/* VIEWS */
.view{display:none;padding:16px 16px 80px}.view.active{display:block}
.max{max-width:680px;margin:0 auto}

/* CHALLENGE CARD */
.ccard{background:#181818;border:1px solid #252525;border-radius:12px;padding:1.125rem;margin-bottom:.875rem;position:relative;overflow:hidden}
.ccard.closed{opacity:.6}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#D85A30,#F5A623)}
.ccard.closed::before{background:#333}
.ctype{display:inline-block;font-size:9px;font-weight:700;background:rgba(216,90,48,.14);color:#E07050;padding:2px 8px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;border:1px solid rgba(216,90,48,.22)}
.ctype.closed-type{background:#1a1a1a;color:#555;border-color:#2a2a2a}
.ctitle{font-size:16px;font-weight:700;color:#f0ece6;margin:0 0 7px;line-height:1.4}
.ccontent{font-size:13px;color:#888;line-height:1.6;margin:0 0 10px;white-space:pre-wrap}
.cmeta{font-size:11px;color:#444;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.live-pill{font-size:9px;font-weight:700;background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.2);padding:2px 8px;border-radius:10px;letter-spacing:.05em}

/* HISTORY TOGGLE */
.history-toggle{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.htog{padding:6px 14px;font-size:12px;font-weight:600;border-radius:20px;cursor:pointer;transition:all .15s;border:1px solid #222;background:none;color:#555}
.htog.active{background:#D85A30;color:#fff;border-color:#D85A30}

/* EMPTY */
.empty{text-align:center;padding:2.5rem 1rem;color:#333}
.ei{font-size:36px;margin-bottom:10px}
.empty strong{display:block;font-size:14px;color:#555;margin-bottom:5px}

/* FORMS */
.fg{margin-bottom:.875rem}
.fl{display:block;font-size:10px;font-weight:700;color:#555;margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
.fi,.fta,.fse{width:100%;padding:10px 13px;background:#181818;border:1px solid #252525;border-radius:8px;color:#e8e0d5;font-size:14px;font-family:inherit;transition:border .15s}
.fi:focus,.fta:focus,.fse:focus{outline:none;border-color:#D85A30}
.fta{min-height:88px;resize:vertical}
.fse{-webkit-appearance:none;cursor:pointer}
.fse option{background:#181818}

/* BUTTONS */
.btn{display:block;width:100%;padding:11px;background:#D85A30;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:hover{background:#c04d26}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:12px;background:#181818;color:#777;border:1px solid #252525;border-radius:7px;cursor:pointer;transition:all .15s;font-weight:500}
.btn-sm:hover{border-color:#444;color:#ccc}
.btn-award{padding:5px 11px;background:rgba(250,199,117,.1);color:#FAC775;border:1px solid rgba(250,199,117,.22);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.btn-award:hover{background:rgba(250,199,117,.2)}
.btn-danger{padding:7px 13px;background:rgba(226,75,74,.08);color:#F09595;border:1px solid rgba(226,75,74,.22);border-radius:6px;font-size:12px;cursor:pointer}
.btn-danger:hover{background:rgba(226,75,74,.18)}
.row2{display:flex;gap:8px}.row2 .btn{flex:1}

/* ALERTS */
.al{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:.875rem}
.al-s{background:rgba(34,197,94,.08);color:#86efac;border:1px solid rgba(34,197,94,.18)}
.al-e{background:rgba(226,75,74,.08);color:#F09595;border:1px solid rgba(226,75,74,.18)}
.al-w{background:rgba(250,199,117,.08);color:#FAC775;border:1px solid rgba(250,199,117,.18)}

/* SUBMISSION CARDS */
.scard{background:#141414;border:1px solid #1e1e1e;border-radius:9px;padding:.875rem;margin-bottom:.625rem}
.shead{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.suser{font-size:13px;font-weight:700;color:#e8e0d5}
.stime{font-size:10px;color:#3a3a3a}
.scontent{font-size:13px;color:#777;line-height:1.55;margin-bottom:6px}
.pts-badge{font-size:12px;font-weight:700;color:#FAC775}
.ver-mark{font-size:10px;color:#22c55e;font-weight:600}
.award-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.pts-input{width:58px;padding:5px 7px;background:#1a1a1a;border:1px solid #252525;border-radius:5px;color:#e8e0d5;font-size:12px;text-align:center}
.pts-input:focus{outline:none;border-color:#FAC775}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 140px);max-height:700px}
.chat-msgs{flex:1;overflow-y:auto;padding-bottom:1rem;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:4px}.chat-msgs::-webkit-scrollbar-track{background:transparent}.chat-msgs::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
.msg{display:flex;gap:9px;margin-bottom:.75rem;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:30px;height:30px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#888;flex-shrink:0;margin-top:2px}
.msg-avatar.editor-av{background:rgba(216,90,48,.2);color:#D85A30}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:7px;margin-bottom:3px}
.msg-user{font-size:12px;font-weight:700;color:#e8e0d5}
.msg-user.editor-name{color:#D85A30}
.msg-time{font-size:10px;color:#333}
.msg-editor-badge{font-size:9px;font-weight:700;background:rgba(216,90,48,.15);color:#D85A30;padding:1px 6px;border-radius:3px;border:1px solid rgba(216,90,48,.2)}
.msg-text{font-size:13px;color:#999;line-height:1.5;word-break:break-word}
.msg-text.editor-text{color:#ccc}
.chat-input-area{padding-top:.875rem;border-top:1px solid #1a1a1a;display:flex;flex-direction:column;gap:8px}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;padding:10px 13px;background:#181818;border:1px solid #252525;border-radius:8px;color:#e8e0d5;font-size:14px;font-family:inherit}
.chat-input:focus{outline:none;border-color:#D85A30}
.chat-send{padding:10px 18px;background:#D85A30;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.chat-send:hover{background:#c04d26}
.chat-username-row{display:flex;gap:8px;align-items:center}
.chat-un-label{font-size:11px;color:#444;flex-shrink:0}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #181818}
.lb-rank{width:28px;text-align:center;font-size:12px;font-weight:700;color:#333}
.lb-rank.g{color:#FAC775;font-size:15px}.lb-rank.sv{color:#888;font-size:14px}.lb-rank.br{color:#b87333;font-size:13px}
.lb-info{flex:1}.lb-name{font-size:14px;font-weight:600;color:#e8e0d5}.lb-tier{font-size:10px;color:#444;margin-top:1px}
.lb-pts{font-size:14px;font-weight:700;color:#FAC775}

/* EDITOR */
.ed-sec{margin-bottom:1.375rem}
.ed-title{font-size:9px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;padding-bottom:7px;border-bottom:1px solid #181818}
.pw-gate{background:#161616;border:1px solid #1e1e1e;border-radius:12px;padding:1.5rem}
.cref{background:#141414;border:1px solid #1e1e1e;border-left:3px solid #D85A30;border-radius:7px;padding:9px 13px;margin-bottom:.875rem;font-size:13px;color:#666}
.cref strong{color:#e8e0d5;display:block;margin-bottom:2px;font-size:13px}
.sec-label{font-size:10px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.08em;margin:.75rem 0 .5rem}
.hint{font-size:10px;color:#2a2a2a;text-align:center;padding:.75rem 0 0}

/* SYNC */
.syncing{position:fixed;bottom:12px;right:12px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px;z-index:999;background:rgba(34,197,94,.08);color:#22c55e;border:1px solid rgba(34,197,94,.18);opacity:0;transition:opacity .3s;pointer-events:none}
.syncing.show{opacity:1}

@media(max-width:400px){.logo span{display:none}.tab{font-size:11px}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">TNV Fact Arena<span>The Nation Voice Myanmar</span></div>
  <div class="live-badge"><div class="dot" id="liveDot"></div><span id="liveStatus">Connecting...</span></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="sw(this,'challenge')">Challenge</button>
  <button class="tab" onclick="sw(this,'submit')">Submit</button>
  <button class="tab" onclick="sw(this,'chat')">Chat</button>
  <button class="tab" onclick="sw(this,'board')">Board</button>
  <button class="tab" onclick="sw(this,'editor')">Editor</button>
</div>

<!-- CHALLENGE -->
<div class="view active" id="view-challenge">
  <div class="max">
    <div class="history-toggle">
      <button class="htog active" onclick="setHistoryMode(false,this)">Live</button>
      <button class="htog" onclick="setHistoryMode(true,this)">History</button>
    </div>
    <div id="challengeDisplay"></div>
    <div id="verifiedPreview"></div>
    <p class="hint">Auto-refresh ၅s</p>
  </div>
</div>

<!-- SUBMIT -->
<div class="view" id="view-submit">
  <div class="max">
    <div id="submitAlert"></div>
    <div id="submitRef"></div>
    <div class="fg"><label class="fl">Username</label><input class="fi" type="text" id="usernameInput" placeholder="reporter_mw" maxlength="30"></div>
    <div class="fg"><label class="fl">Evidence — Source URL, Logic, Cross-reference</label><textarea class="fta" id="evidenceInput" placeholder="သင်ရှာတွေ့တဲ့ source တင်ပါ...&#10;&#10;- Source: https://...&#10;- အကြောင်းအရင်း: ..."></textarea></div>
    <button class="btn" id="submitBtn" onclick="doSubmit()">Submit Evidence</button>
  </div>
</div>

<!-- CHAT -->
<div class="view" id="view-chat">
  <div class="max">
    <div class="chat-wrap">
      <div class="chat-msgs" id="chatMsgs">
        <div class="empty" style="padding:2rem 0"><div class="ei">💬</div><strong>Chat ဗလာနေသေးတယ်</strong>ပထမဆုံး message ပို့ပါ</div>
      </div>
      <div class="chat-input-area">
        <div class="chat-username-row">
          <span class="chat-un-label">Name:</span>
          <input class="fi" style="flex:1;padding:7px 11px;font-size:13px" type="text" id="chatUsername" placeholder="Your name..." maxlength="30">
        </div>
        <div class="chat-input-row">
          <input class="chat-input" type="text" id="chatInput" placeholder="Message တစ်ခုရေးပါ..." maxlength="500" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSendChat()}">
          <button class="chat-send" onclick="doSendChat()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="view" id="view-board">
  <div class="max">
    <div id="lbList"></div>
    <p class="hint">Points ရရှိမှ ဒီမှာပေါ်လာမယ်</p>
  </div>
</div>

<!-- EDITOR -->
<div class="view" id="view-editor">
  <div class="max">
    <div id="editorAlert"></div>
    <div id="editorLogin">
      <div class="pw-gate">
        <div style="font-size:13px;font-weight:600;color:#666;margin-bottom:1rem">Editor Login</div>
        <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="editorPw" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')doEdLogin()"></div>
        <button class="btn" onclick="doEdLogin()">Login as Editor</button>
      </div>
    </div>
    <div id="editorPanel" style="display:none">

      <div class="ed-sec">
        <div class="ed-title">Post New Challenge</div>
        <div class="fg"><label class="fl">Type</label>
          <select class="fse" id="cType">
            <option value="Claim">Claim — True/False?</option>
            <option value="Image">Image — Find Source</option>
            <option value="Location">Location — Verify Geolocation</option>
            <option value="Video">Video — Verify Authenticity</option>
          </select>
        </div>
        <div class="fg"><label class="fl">Challenge Title</label><input class="fi" type="text" id="cTitle" placeholder="Challenge ခေါင်းစဉ်..."></div>
        <div class="fg"><label class="fl">Content / Instructions</label><textarea class="fta" id="cContent" placeholder="Challenge အသေးစိတ်..."></textarea></div>
        <div class="row2">
          <button class="btn" onclick="doPostChallenge()">Post Challenge</button>
          <button class="btn-sm" onclick="doCloseChallenge()">Close Session</button>
        </div>
      </div>

      <div class="ed-sec">
        <div class="ed-title">Current Submissions <span id="subCountLabel"></span></div>
        <div id="editorSubs"><div style="font-size:13px;color:#333">Submissions မရှိသေးပါ</div></div>
      </div>

      <div class="ed-sec">
        <div class="ed-title">Past Challenges</div>
        <div id="pastChallenges"><div style="font-size:13px;color:#333">Past challenges မရှိသေးပါ</div></div>
      </div>

      <div class="ed-sec">
        <div class="ed-title">Danger Zone</div>
        <div class="row2" style="max-width:300px">
          <button class="btn-danger" onclick="doResetAll()">Reset All</button>
          <button class="btn-danger" onclick="doClearChat()">Clear Chat</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="syncing" id="syncBadge">Syncing</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const DB   = 'https://tnv-fact-arena-default-rtdb.firebaseio.com';
const PASS = 'TNVEditor2026';

// ─── STATE ─────────────────────────────────────────────────────────────────
let isEd       = false;
let activeTab  = 'challenge';
let showHistory= false;
let timer      = null;
let lastChatTs = 0;

// ─── FIREBASE REST ──────────────────────────────────────────────────────────
const fb = {
  async get(p)       { try{const r=await fetch(`${DB}/${p}.json`);return r.ok?await r.json():null}catch{return null} },
  async set(p,d)     { try{const r=await fetch(`${DB}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.ok}catch{return false} },
  async patch(p,d)   { try{const r=await fetch(`${DB}/${p}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.ok}catch{return false} },
  async push(p,d)    { try{const r=await fetch(`${DB}/${p}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)return null;return(await r.json()).name}catch{return null} },
  async del(p)       { try{await fetch(`${DB}/${p}.json`,{method:'DELETE'})}catch{} }
};

// ─── HELPERS ───────────────────────────────────────────────────────────────
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toArr(o){if(!o)return[];return Object.entries(o).map(([id,v])=>({...v,_id:id}))}
function ago(ts){if(!ts)return'';const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return new Date(ts).toLocaleDateString()}
function tier(p){if(p>=5000)return'⭐ Master Verifier';if(p>=2000)return'🔍 Senior Investigator';if(p>=500)return'📰 Field Correspondent';return'🌱 Rookie Reporter'}
function initials(n){if(!n)return'?';const w=n.trim().split(/\s+/);return w.length>1?(w[0][0]+w[w.length-1][0]).toUpperCase():n.substring(0,2).toUpperCase()}
function showAl(id,type,msg,ms=4000){const el=document.getElementById(id);if(!el)return;el.innerHTML=`<div class="al al-${type}">${esc(msg)}</div>`;if(ms>0)setTimeout(()=>{el.innerHTML=''},ms)}
function sync(){const el=document.getElementById('syncBadge');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200)}

// ─── TAB SWITCH ────────────────────────────────────────────────────────────
function sw(btn,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-'+tab).classList.add('active');
  activeTab=tab;
  if(tab==='challenge')  renderChallenge();
  if(tab==='submit')     updateSubmitRef();
  if(tab==='chat')       renderChat();
  if(tab==='board')      renderLB();
  if(tab==='editor'&&isEd){loadEdSubs();loadPastChallenges()}
}

// ─── HISTORY TOGGLE ────────────────────────────────────────────────────────
function setHistoryMode(h,btn){
  showHistory=h;
  document.querySelectorAll('.htog').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderChallenge();
}

// ─── CHALLENGE VIEW ────────────────────────────────────────────────────────
async function renderChallenge(){
  sync();
  const [chData,subsObj]= await Promise.all([fb.get('challenges'),fb.get('submissions')]);
  const el  = document.getElementById('challengeDisplay');
  const pre = document.getElementById('verifiedPreview');
  const dot = document.getElementById('liveDot');
  const stat= document.getElementById('liveStatus');
  const subs= toArr(subsObj);

  if(!chData){
    el.innerHTML=`<div class="empty"><div class="ei">📡</div><strong>Challenge မရှိသေးပါ</strong>Editor က challenge ပို့ပြီးမှ ဒီမှာပေါ်လာမယ်</div>`;
    dot.className='dot'; stat.textContent='Waiting'; pre.innerHTML=''; return;
  }

  const all=toArr(chData).sort((a,b)=>b.postedAt-a.postedAt);
  const live=all.find(c=>c.status==='active');

  if(showHistory){
    // HISTORY MODE
    dot.className='dot'; stat.textContent='History';
    const closed=all.filter(c=>c.status==='closed');
    if(!closed.length){
      el.innerHTML=`<div class="empty"><div class="ei">📋</div><strong>Past challenges မရှိသေးပါ</strong></div>`;
      pre.innerHTML=''; return;
    }
    el.innerHTML=closed.map(ch=>{
      const chSubs=subs.filter(s=>s.challengeId===ch._id);
      const top=chSubs.filter(s=>s.points>0).sort((a,b)=>b.points-a.points)[0];
      return `<div class="ccard closed">
        <span class="ctype closed-type">CLOSED · ${esc(ch.type)}</span>
        <p class="ctitle">${esc(ch.title)}</p>
        <p class="ccontent" style="font-size:12px">${esc(ch.content.substring(0,120))}${ch.content.length>120?'...':''}</p>
        <div class="cmeta">
          <span>${new Date(ch.postedAt).toLocaleDateString()}</span>
          <span>Submissions: ${chSubs.length}</span>
          ${top?`<span style="color:#FAC775">🏆 ${esc(top.username)} — ${top.points}pts</span>`:''}
        </div>
      </div>`;
    }).join('');
    pre.innerHTML=''; return;
  }

  // LIVE MODE
  if(!live){
    el.innerHTML=`<div class="empty"><div class="ei">📡</div><strong>Active challenge မရှိပါ</strong>Session ပိတ်ထားသည်</div>`;
    dot.className='dot'; stat.textContent='Closed'; pre.innerHTML=''; return;
  }

  const liveSubs=subs.filter(s=>s.challengeId===live._id);
  const verified=liveSubs.filter(s=>s.points>0).sort((a,b)=>b.points-a.points);

  el.innerHTML=`<div class="ccard">
    <span class="ctype">${esc(live.type)}</span> <span class="live-pill">LIVE</span>
    <p class="ctitle" style="margin-top:8px">${esc(live.title)}</p>
    <p class="ccontent">${esc(live.content)}</p>
    <div class="cmeta">
      <span>${new Date(live.postedAt).toLocaleTimeString('my-MM',{hour:'2-digit',minute:'2-digit'})}</span>
      <span>Submissions: ${liveSubs.length}</span>
      ${verified.length?`<span style="color:#22c55e">Verified: ${verified.length}</span>`:''}
    </div>
  </div>`;
  dot.className='dot on'; stat.textContent='LIVE';

  if(verified.length){
    pre.innerHTML=`<div class="sec-label">Top Verified Submissions</div>`+
      verified.slice(0,3).map(s=>`<div class="scard">
        <div class="shead"><span class="suser">${esc(s.username)}</span><span class="pts-badge">+${s.points}pts</span></div>
        <div class="scontent">${esc(s.content.substring(0,160))}${s.content.length>160?'...':''}</div>
      </div>`).join('');
  } else { pre.innerHTML=''; }
}

async function updateSubmitRef(){
  const chData=await fb.get('challenges');
  const el=document.getElementById('submitRef');
  if(!chData){ el.innerHTML=`<div class="al al-w">Active challenge မရှိပါ</div>`; return; }
  const live=toArr(chData).find(c=>c.status==='active');
  if(live){ el.innerHTML=`<div class="cref"><strong>${esc(live.title)}</strong>${esc(live.content.substring(0,80))}${live.content.length>80?'...':''}</div>`; }
  else { el.innerHTML=`<div class="al al-w">Active challenge မရှိပါ — Editor က challenge ပို့ပြီးမှ submit လုပ်ပါ</div>`; }
}

// ─── SUBMIT ────────────────────────────────────────────────────────────────
async function doSubmit(){
  const btn=document.getElementById('submitBtn');
  const un=document.getElementById('usernameInput').value.trim();
  const ev=document.getElementById('evidenceInput').value.trim();
  if(!un){ showAl('submitAlert','e','Username ထည့်ပါ'); return; }
  if(ev.length<10){ showAl('submitAlert','e','Evidence အသေးစိတ် ထည့်ပါ'); return; }
  btn.disabled=true; btn.textContent='Sending...';

  const chData=await fb.get('challenges');
  const live=chData?toArr(chData).find(c=>c.status==='active'):null;
  if(!live){ showAl('submitAlert','e','Active challenge မရှိပါ'); btn.disabled=false; btn.textContent='Submit Evidence'; return; }

  const subsObj=await fb.get('submissions');
  const subs=toArr(subsObj);
  if(subs.find(s=>s.username===un&&s.challengeId===live._id)){
    showAl('submitAlert','e',`"${un}" က ဒီ challenge မှာ submit ပြီးပြီ`);
    btn.disabled=false; btn.textContent='Submit Evidence'; return;
  }

  const key=await fb.push('submissions',{challengeId:live._id,username:un,content:ev,timestamp:Date.now(),points:0});
  if(key){
    localStorage.setItem('tnv_un',un);
    document.getElementById('evidenceInput').value='';
    showAl('submitAlert','s','Submit ပြီးပါပြီ ✓  Editor review ကို စောင့်ပါ');
    sync();
  } else { showAl('submitAlert','e','Error — network စစ်ကြည့်ပြီး ထပ်ကြိုးစားပါ'); }
  btn.disabled=false; btn.textContent='Submit Evidence';
}

// ─── CHAT ──────────────────────────────────────────────────────────────────
async function renderChat(){
  sync();
  const msgs=await fb.get('chat');
  const el=document.getElementById('chatMsgs');
  if(!msgs){
    el.innerHTML=`<div class="empty" style="padding:2rem 0"><div class="ei">💬</div><strong>Chat ဗလာနေသေးတယ်</strong>ပထမဆုံး message ပို့ပါ</div>`;
    return;
  }
  const arr=toArr(msgs).sort((a,b)=>a.timestamp-b.timestamp);
  const latest=arr[arr.length-1]?.timestamp||0;
  // only re-render if new messages
  if(latest<=lastChatTs && el.children.length>1) return;
  lastChatTs=latest;

  el.innerHTML=arr.map(m=>{
    const isEd=m.isEditor;
    return `<div class="msg">
      <div class="msg-avatar ${isEd?'editor-av':''}">${esc(initials(m.username))}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-user ${isEd?'editor-name':''}">${esc(m.username)}</span>
          ${isEd?'<span class="msg-editor-badge">EDITOR</span>':''}
          <span class="msg-time">${ago(m.timestamp)}</span>
        </div>
        <div class="msg-text ${isEd?'editor-text':''}">${esc(m.message)}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function doSendChat(){
  const un=document.getElementById('chatUsername').value.trim();
  const msg=document.getElementById('chatInput').value.trim();
  if(!un){ alert('Name ထည့်ပါ'); return; }
  if(!msg) return;
  document.getElementById('chatInput').value='';
  localStorage.setItem('tnv_chat_un',un);
  await fb.push('chat',{username:un,message:msg,timestamp:Date.now(),isEditor:isEd});
  renderChat();
}

// ─── LEADERBOARD ──────────────────────────────────────────────────────────
async function renderLB(){
  sync();
  const lb=await fb.get('leaderboard');
  const el=document.getElementById('lbList');
  if(!lb){ el.innerHTML=`<div class="empty"><div class="ei">🏆</div><strong>Leaderboard ဗလာနေသေးတယ်</strong></div>`; return; }
  const entries=Object.entries(lb).filter(([,p])=>p>0).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){ el.innerHTML=`<div class="empty"><div class="ei">🏆</div><strong>Leaderboard ဗလာနေသေးတယ်</strong></div>`; return; }
  const cls=i=>i===0?'g':i===1?'sv':i===2?'br':'';
  const rk=i=>i===0?'①':i===1?'②':i===2?'③':i+1;
  el.innerHTML=entries.map(([n,p],i)=>`<div class="lb-row">
    <span class="lb-rank ${cls(i)}">${rk(i)}</span>
    <div class="lb-info"><div class="lb-name">${esc(n)}</div><div class="lb-tier">${tier(p)}</div></div>
    <span class="lb-pts">${p} pts</span>
  </div>`).join('');
}

// ─── EDITOR ────────────────────────────────────────────────────────────────
function doEdLogin(){
  if(document.getElementById('editorPw').value===PASS){
    isEd=true;
    document.getElementById('editorLogin').style.display='none';
    document.getElementById('editorPanel').style.display='block';
    // sync chat username
    const saved=localStorage.getItem('tnv_chat_un');
    if(saved) document.getElementById('chatUsername').value=saved;
    loadEdSubs(); loadPastChallenges();
  } else { showAl('editorAlert','e','Password မမှန်ပါ'); document.getElementById('editorPw').value=''; }
}

async function doPostChallenge(){
  const title=document.getElementById('cTitle').value.trim();
  const content=document.getElementById('cContent').value.trim();
  const type=document.getElementById('cType').value;
  if(!title||!content){ showAl('editorAlert','e','Title နှင့် Content ထည့်ပါ'); return; }
  const id=Date.now().toString();
  const ok=await fb.set(`challenges/${id}`,{id,title,content,type,status:'active',postedAt:Date.now()});
  if(ok){
    document.getElementById('cTitle').value='';
    document.getElementById('cContent').value='';
    showAl('editorAlert','s','Challenge ပို့ပြီးပါပြီ ✓  Players တွေ မြင်ပြီ');
    loadEdSubs(); loadPastChallenges();
  } else { showAl('editorAlert','e','Error — network စစ်ကြည့်ပါ'); }
}

async function doCloseChallenge(){
  const chData=await fb.get('challenges');
  if(!chData){ showAl('editorAlert','e','Challenge မရှိပါ'); return; }
  const live=toArr(chData).find(c=>c.status==='active');
  if(!live){ showAl('editorAlert','w','Active challenge မရှိပါ'); return; }
  await fb.patch(`challenges/${live._id}`,{status:'closed'});
  showAl('editorAlert','s','Session ပိတ်ပြီးပါပြီ');
  loadPastChallenges();
}

async function loadEdSubs(){
  sync();
  const [chData,subsObj]=await Promise.all([fb.get('challenges'),fb.get('submissions')]);
  const el=document.getElementById('editorSubs');
  const badge=document.getElementById('subCountLabel');
  const live=chData?toArr(chData).find(c=>c.status==='active'):null;
  const subs=toArr(subsObj).filter(s=>live&&s.challengeId===live._id).sort((a,b)=>b.timestamp-a.timestamp);
  badge.textContent=subs.length?`(${subs.length})`:'';
  if(!subs.length){ el.innerHTML=`<div style="font-size:13px;color:#333">${live?'Submissions မရှိသေးပါ':'Active challenge မရှိပါ'}</div>`; return; }
  el.innerHTML=subs.map(s=>`<div class="scard">
    <div class="shead"><span class="suser">${esc(s.username)}</span><span class="stime">${ago(s.timestamp)}</span></div>
    <div class="scontent" style="margin-bottom:7px">${esc(s.content)}</div>
    <div class="award-row">
      <input class="pts-input" type="number" id="pts_${esc(s._id)}" min="0" max="200" placeholder="pts" value="${s.points||''}">
      <button class="btn-award" onclick="doAward('${esc(s._id)}','${esc(s.username)}',${s.points||0})">Award Points</button>
      ${s.points>0?`<span class="ver-mark">✓ ${s.points}pts</span>`:''}
    </div>
  </div>`).join('');
}

async function loadPastChallenges(){
  const chData=await fb.get('challenges');
  const el=document.getElementById('pastChallenges');
  if(!chData){ el.innerHTML=`<div style="font-size:13px;color:#333">Past challenges မရှိသေးပါ</div>`; return; }
  const closed=toArr(chData).filter(c=>c.status==='closed').sort((a,b)=>b.postedAt-a.postedAt);
  if(!closed.length){ el.innerHTML=`<div style="font-size:13px;color:#333">Past challenges မရှိသေးပါ</div>`; return; }
  const subsObj=await fb.get('submissions');
  const subs=toArr(subsObj);
  el.innerHTML=closed.map(ch=>{
    const chSubs=subs.filter(s=>s.challengeId===ch._id);
    const top=chSubs.filter(s=>s.points>0).sort((a,b)=>b.points-a.points)[0];
    return `<div class="scard" style="margin-bottom:.5rem">
      <div class="shead"><span class="suser" style="font-size:12px">${esc(ch.type)}: ${esc(ch.title.substring(0,40))}${ch.title.length>40?'...':''}</span><span class="stime">${ago(ch.postedAt)}</span></div>
      <div style="font-size:11px;color:#444;margin-top:3px">Submissions: ${chSubs.length} ${top?`· 🏆 ${esc(top.username)} (${top.points}pts)`:''}</div>
    </div>`;
  }).join('');
}

async function doAward(fbKey,username,oldPts){
  const ptsEl=document.getElementById('pts_'+fbKey);
  if(!ptsEl) return;
  const pts=parseInt(ptsEl.value)||0;
  await fb.patch(`submissions/${fbKey}`,{points:pts});
  const lb=await fb.get('leaderboard')||{};
  lb[username]=Math.max(0,(lb[username]||0)-oldPts+pts);
  await fb.set('leaderboard',lb);
  showAl('editorAlert','s',`${username} ကို ${pts}pts ပေးပြီးပါပြီ ✓`);
  loadEdSubs();
}

async function doResetAll(){
  if(!confirm('Data အားလုံး ဖျက်မှာ သေချာလား?\n(Challenges + Submissions + Leaderboard)')) return;
  await Promise.all([fb.del('challenges'),fb.del('submissions'),fb.del('leaderboard')]);
  showAl('editorAlert','s','Reset ပြီးပါပြီ');
  loadEdSubs(); loadPastChallenges();
}

async function doClearChat(){
  if(!confirm('Chat messages အားလုံး ဖျက်မှာ သေချာလား?')) return;
  await fb.del('chat');
  lastChatTs=0;
  showAl('editorAlert','s','Chat cleared ✓');
  renderChat();
}

// ─── AUTO REFRESH ──────────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timer);
  timer=setInterval(async()=>{
    if(activeTab==='challenge')  renderChallenge();
    if(activeTab==='chat')       renderChat();
    if(activeTab==='board')      renderLB();
    if(activeTab==='editor'&&isEd){ loadEdSubs(); loadPastChallenges(); }
  },5000);
}

// ─── INIT ──────────────────────────────────────────────────────────────────
const svUn=localStorage.getItem('tnv_un');
if(svUn) document.getElementById('usernameInput').value=svUn;
const svChat=localStorage.getItem('tnv_chat_un');
if(svChat) document.getElementById('chatUsername').value=svChat;
renderChallenge();
startTimer();
</script>
